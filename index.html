<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<base target="_self">
<title>CDC Fail Holds — Management Review</title>
<style>
  :root {
    --bg: #060f06;
    --bg2: #081308;
    --bg3: #0a2a0a;
    --green: #3ddd3d;
    --green-btn: #3ddd3d;
    --green-hover: #52ee52;
    --green-active: #2aaa2a;
    --green-scramble: #4aff4a;
    --text-dim: rgba(74,255,74,0.45);
    --text-soft: rgba(74,255,74,0.55);
    --text-faint: rgba(74,255,74,0.3);
    --border: rgba(74,255,74,0.25);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    width: 100%;
    height: 100%;
    background: var(--bg);
    font-family: 'Courier New', Courier, monospace;
    overflow: hidden;
  }

  #terminal-launcher {
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100vh;
    height: 100dvh;
    background: radial-gradient(ellipse at center, rgba(10,42,10,0.65) 0%, var(--bg) 68%);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px 24px;
    overflow: hidden;
    z-index: 2147483647;
    font-family: 'Courier New', Courier, monospace;
  }

  .scanlines {
    position: absolute;
    inset: 0;
    pointer-events: none;
    z-index: 2;
    background: repeating-linear-gradient(
      to bottom,
      transparent 0px, transparent 3px,
      rgba(0,0,0,0.18) 3px, rgba(0,0,0,0.18) 4px
    );
  }

  .vignette {
    position: absolute;
    inset: 0;
    pointer-events: none;
    z-index: 3;
    background: radial-gradient(ellipse at center, transparent 54%, rgba(0,0,0,0.72) 100%);
  }

  #glitch-canvas {
    position: absolute;
    inset: 0;
    z-index: 4;
    pointer-events: none;
    opacity: 0;
  }

  .css-glitch-1, .css-glitch-2 {
    position: absolute; inset: 0;
    z-index: 4; pointer-events: none; opacity: 0;
  }
  .glitch-active .css-glitch-1 {
    opacity: 1; background: rgba(74,255,74,0.07);
    animation: glitch-shift-1 0.18s steps(1) 3;
  }
  .glitch-active .css-glitch-2 {
    opacity: 1; background: rgba(255,60,60,0.05);
    animation: glitch-shift-2 0.22s steps(1) 3;
    animation-delay: 0.04s;
  }

  .corner { position: absolute; width: 18px; height: 18px; z-index: 5; }
  .corner.tl { top: 14px; left: 14px; border-top: 1.5px solid rgba(74,255,74,0.4); border-left: 1.5px solid rgba(74,255,74,0.4); }
  .corner.tr { top: 14px; right: 14px; border-top: 1.5px solid rgba(74,255,74,0.4); border-right: 1.5px solid rgba(74,255,74,0.4); }
  .corner.bl { bottom: 14px; left: 14px; border-bottom: 1.5px solid rgba(74,255,74,0.4); border-left: 1.5px solid rgba(74,255,74,0.4); }
  .corner.br { bottom: 14px; right: 14px; border-bottom: 1.5px solid rgba(74,255,74,0.4); border-right: 1.5px solid rgba(74,255,74,0.4); }

  .content {
    position: relative;
    z-index: 5;
    width: 100%;
    max-width: 760px;
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
  }

  /* ── Corp header ── */
  .corp-header {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0;
    font-size: 14px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 28px;
    white-space: nowrap;
  }

  .corp-header .pipe {
    /* Fixed-width separator so spacing is perfectly even */
    display: inline-block;
    width: 2em;
    text-align: center;
    letter-spacing: 0;
    opacity: 0.5;
  }

  .corp-header .part {
    /* Both sides of the pipe share the same tracking */
    letter-spacing: 3px;
  }

  /* ── Title block ── */
  .title-block { margin-bottom: 12px; }

  .title-main {
    display: block;
    /* clamp: shrinks on mobile so "// CDC FAIL HOLDS" fits one line.
       Floor of 22px keeps it readable; 5.5vw tracks viewport; 36px caps desktop. */
    font-size: clamp(22px, 5.5vw, 36px);
    font-weight: 700;
    letter-spacing: 5px;
    line-height: 1.2;
    white-space: nowrap;          /* prevent mid-phrase wrapping */
    color: var(--green);
    text-shadow: 0 0 14px rgba(61,221,61,0.5);
  }

  .title-sub-line {
    display: block;
    margin-top: 6px;
    font-size: clamp(17px, 2.8vw, 22px);
    font-weight: 700;
    letter-spacing: 3px;
    color: var(--green);
    text-shadow: 0 0 10px rgba(61,221,61,0.4);
  }

  /* .title-caption removed — no Phase 2 fluff line */

  .divider {
    width: min(100%, 660px);
    height: 1px;
    position: relative;
    margin: 26px 0 24px;
    background: var(--border);
  }
  .divider::before, .divider::after {
    content: ''; position: absolute; top: -2.5px;
    width: 6px; height: 6px; background: var(--green);
  }
  .divider::before { left: 0; }
  .divider::after { right: 0; }

  .status-line {
    min-height: 22px;
    margin-bottom: 30px;
    font-size: 14px;
    letter-spacing: 2px;
    color: rgba(74,255,74,0.5);
    white-space: nowrap;
  }

  .cursor {
    display: inline-block;
    width: 9px; height: 15px;
    margin-left: 4px;
    vertical-align: middle;
    background: var(--green);
    animation: blink 1.1s step-end infinite;
  }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

  #launch-btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: min(380px, 92vw);
    height: 64px;
    border: 2.5px solid var(--green-btn);
    background: var(--green-btn);
    color: var(--bg);
    font-family: 'Courier New', Courier, monospace;
    font-size: 17px;
    font-weight: 700;
    letter-spacing: 3.5px;
    text-transform: uppercase;
    cursor: pointer;
    user-select: none;
    outline: none;
    -webkit-appearance: none;
    appearance: none;
    position: relative;
    transition: background 0.1s, box-shadow 0.15s;
    white-space: nowrap;
  }

  #launch-btn:hover {
    background: var(--green-hover);
    box-shadow: 0 0 28px rgba(61,221,61,0.55), inset 0 0 12px rgba(255,255,255,0.1);
  }
  #launch-btn:active { background: var(--green-active); }
  #launch-btn.scrambling {
    background: var(--bg);
    color: var(--green-scramble);
    border-color: var(--green-scramble);
    box-shadow: 0 0 20px rgba(74,255,74,0.45);
  }

  #btn-text {
    pointer-events: none;
    font-family: 'Courier New', Courier, monospace;
    font-size: 17px;
    font-weight: 700;
    letter-spacing: 3.5px;
  }

  /* ── Footer ── */
  .footer-line {
    margin-top: 30px;
    font-size: 13px;
    letter-spacing: 2px;
    color: var(--text-faint);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0;
    white-space: nowrap;
  }

  .footer-sep {
    display: inline-block;
    width: 1.8em;
    text-align: center;
    letter-spacing: 0;
    opacity: 0.45;
  }

  @keyframes glitch-shift-1 {
    0%,100%{ clip-path: inset(0 0 95% 0); transform: translateX(0); }
    20%    { clip-path: inset(10% 0 70% 0); transform: translateX(-6px); }
    40%    { clip-path: inset(40% 0 40% 0); transform: translateX(5px); }
    60%    { clip-path: inset(70% 0 10% 0); transform: translateX(-4px); }
    80%    { clip-path: inset(90% 0 2% 0); transform: translateX(3px); }
  }
  @keyframes glitch-shift-2 {
    0%,100%{ clip-path: inset(0 0 95% 0); transform: translateX(0); }
    25%    { clip-path: inset(20% 0 55% 0); transform: translateX(7px); }
    50%    { clip-path: inset(50% 0 25% 0); transform: translateX(-5px); }
    75%    { clip-path: inset(75% 0 5% 0); transform: translateX(4px); }
  }

  /* ── Mobile ── */
  @media (max-width: 600px) {
    #terminal-launcher { padding: 28px 16px; }

    .corp-header {
      flex-direction: column;
      gap: 4px;
      white-space: normal;
      margin-bottom: 16px;
    }
    .corp-header .pipe { display: none; }

    .title-main { letter-spacing: 3px; }

    /* Shrink font + tracking so longer strings never wrap */
    .status-line {
      font-size: 11px;
      letter-spacing: 1px;
      white-space: nowrap;
      margin-bottom: 20px;
    }

    .divider      { margin: 16px 0 14px; }
    #launch-btn   { height: 58px; font-size: 15px; letter-spacing: 2px; }
    #btn-text     { font-size: 15px; letter-spacing: 2px; }

    .footer-line  { flex-direction: column; gap: 3px; margin-top: 20px; }
    .footer-sep   { display: none; }
  }
</style>
</head>
<body>
<div id="terminal-launcher">
  <div class="scanlines"></div>
  <div class="vignette"></div>
  <canvas id="glitch-canvas"></canvas>
  <div class="css-glitch-1"></div>
  <div class="css-glitch-2"></div>
  <div class="corner tl"></div>
  <div class="corner tr"></div>
  <div class="corner bl"></div>
  <div class="corner br"></div>

  <div class="content">

    <!-- Corp header: fixed-width pipe gives perfectly even spacing on all screens -->
    <div class="corp-header">
      <span class="part">THERMO FISHER SCIENTIFIC</span>
      <span class="pipe">|</span>
      <span class="part">CDC INVENTORY CONTROL</span>
    </div>

    <div class="title-block">
      <!-- white-space:nowrap + clamp font-size keeps this on one line on mobile -->
      <span class="title-main">// CDC FAIL HOLDS</span>
      <span class="title-sub-line">MANAGEMENT REVIEW</span>
      <!-- Phase 2 caption removed -->
    </div>

    <div class="divider"></div>

    <div class="status-line" id="status-text">
      SYSTEM: READY &nbsp;|&nbsp; AWAITING OPERATOR<span class="cursor"></span>
    </div>

    <button id="launch-btn" type="button">
      <span id="btn-text">ENTER FAIL HOLDS TERMINAL</span>
    </button>

    <div class="footer-line">
      <span id="today-date"></span>
      <span class="footer-sep">&middot;</span>
      <span>PHASE 2 &mdash; HOLD MANAGEMENT</span>
    </div>

  </div>
</div>

<script>
(function () {
  var APP_URL = 'https://apps.powerapps.com/play/e/default-b67d722d-aa8a-4777-a169-ebeb7a6a3b67/a/3087df0e-02ac-4e69-b189-073eb430e74e?tenantId=b67d722d-aa8a-4777-a169-ebeb7a6a3b67&forceSignIn=true';
  var launcher     = document.getElementById('terminal-launcher');
  var canvas       = document.getElementById('glitch-canvas');
  var statusEl     = document.getElementById('status-text');
  var btnEl        = document.getElementById('launch-btn');
  var btnTextEl    = document.getElementById('btn-text');
  var todayEl      = document.getElementById('today-date');
  var canvasOk     = false;
  var ctx          = null;
  var isScrambling = false;
  var scrambleRAF  = null;
  var crtRAF       = null;
  var shutdownOverlay = null;

  window.addEventListener('pageshow', function(e) {
    resetLauncher();
    if (e.persisted) {
      var stale = document.querySelector('canvas[style*="z-index:2147483647"]');
      if (stale && stale.parentNode) stale.parentNode.removeChild(stale);
    }
  });

  window.addEventListener('pagehide', function() {
    resetLauncher();
  });

  todayEl.textContent = new Date().toLocaleDateString('en-US', { month:'2-digit', day:'2-digit', year:'numeric' });

  try {
    ctx = canvas.getContext('2d');
    if (ctx) { ctx.fillRect(0,0,1,1); canvasOk = true; }
  } catch(e) { canvasOk = false; ctx = null; }

  function rInt(a,b){ return Math.floor(Math.random()*(b-a))+a; }

  function resizeCanvas() {
    canvas.width  = launcher.offsetWidth;
    canvas.height = launcher.offsetHeight;
  }

  function scheduleGlitch() {
    window.setTimeout(function(){
      canvasOk ? runCanvasGlitch() : runCssGlitch();
    }, rInt(2800,7000));
  }

  function runCssGlitch() {
    launcher.classList.add('glitch-active');
    window.setTimeout(function(){
      launcher.classList.remove('glitch-active');
      scheduleGlitch();
    }, 350);
  }

  function runCanvasGlitch() {
    if (!canvasOk || !ctx) { runCssGlitch(); return; }
    resizeCanvas();
    var w = canvas.width, h = canvas.height;
    var duration = rInt(80,220);
    var start = performance.now();
    var slices = [];
    for (var i=0; i<rInt(3,9); i++) {
      slices.push({ y:rInt(0,h-20), sh:rInt(2,18), offset:(Math.random()-0.5)*rInt(8,40) });
    }
    var noiseLines = rInt(4,12);
    function frame(now) {
      var elapsed = now - start;
      if (elapsed > duration) {
        ctx.clearRect(0,0,w,h);
        canvas.style.opacity = 0;
        scheduleGlitch();
        return;
      }
      var p = elapsed / duration;
      canvas.style.opacity = String(Math.sin(p*Math.PI)*0.85);
      ctx.clearRect(0,0,w,h);
      for (var s=0; s<slices.length; s++) {
        var sl = slices[s];
        var shift = sl.offset * Math.sin(p*Math.PI);
        ctx.fillStyle = 'rgba(0,0,0,'+(0.55+Math.random()*0.3)+')';
        ctx.fillRect(0,sl.y,w,sl.sh);
        ctx.fillStyle = 'rgba(74,255,74,'+(0.06+Math.random()*0.08)+')';
        ctx.fillRect(shift,sl.y,w,sl.sh);
        if (Math.random()<0.25) {
          ctx.fillStyle = 'rgba(255,74,74,'+(0.04+Math.random()*0.05)+')';
          ctx.fillRect(shift+rInt(-4,4),sl.y,w,sl.sh);
        }
      }
      for (var n=0; n<noiseLines; n++) {
        ctx.fillStyle = 'rgba(74,255,74,'+(0.03+Math.random()*0.06)+')';
        ctx.fillRect(rInt(0,w-120),rInt(0,h),rInt(20,120),1);
      }
      if (Math.random()<0.18) {
        ctx.fillStyle = 'rgba(74,255,74,'+(0.03+Math.random()*0.04)+')';
        ctx.fillRect(0,rInt(0,h-40),w,rInt(6,30));
      }
      window.requestAnimationFrame(frame);
    }
    window.requestAnimationFrame(frame);
  }

  // Polished status rotation — tighter, more purposeful
  var statusMessages = [
    'SYSTEM: READY \u00a0|\u00a0 AWAITING OPERATOR',
    'SHAREPOINT: CONNECTED \u00a0|\u00a0 LISTS SYNCED',
    'FLOW ENGINE: ACTIVE \u00a0|\u00a0 ALERTS LIVE',
    'SYSTEM: READY \u00a0|\u00a0 AWAITING OPERATOR'
  ];
  var msgIdx = 0;
  window.setInterval(function(){
    msgIdx = (msgIdx+1) % statusMessages.length;
    statusEl.innerHTML = statusMessages[msgIdx]+'<span class="cursor"></span>';
  }, 4200);

  var alien = '!@#$%^&*<>?/\\|[]{}~\u00b1\u00a7\u00b6\u0394\u03a8\u03a9\u039e\u039b\u0398\u03a6\u03b1\u03b2\u03b3\u03b4\u03b5\u03b6\u03b7\u03b8';
  var defaultText = 'ENTER FAIL HOLDS TERMINAL';

  function pickAlien(){ return alien[Math.floor(Math.random()*alien.length)]; }

  function resetLauncher() {
    if (scrambleRAF) {
      window.cancelAnimationFrame(scrambleRAF);
      scrambleRAF = null;
    }
    if (crtRAF) {
      window.cancelAnimationFrame(crtRAF);
      crtRAF = null;
    }
    if (shutdownOverlay && shutdownOverlay.parentNode) {
      shutdownOverlay.parentNode.removeChild(shutdownOverlay);
    }
    shutdownOverlay = null;

    isScrambling = false;
    btnEl.style.pointerEvents = '';
    btnEl.classList.remove('scrambling');
    btnTextEl.textContent = defaultText;
    launcher.classList.remove('glitch-active');
    canvas.style.opacity = 0;

    if (ctx) {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
    }
    resizeCanvas();
  }

  function scrambleText(finalText, durationMs, onDone) {
    var len = finalText.length;
    var startTime = performance.now();
    function frame(now) {
      var elapsed  = now - startTime;
      var progress = Math.min(elapsed/durationMs, 1);
      var resolved = Math.floor(progress*progress*len);
      var display  = '';
      for (var i=0; i<len; i++) {
        if (finalText[i]===' ') display+=' ';
        else if (i<resolved)    display+=finalText[i];
        else                    display+=pickAlien();
      }
      btnTextEl.textContent = display;
      if (progress<1) {
        scrambleRAF = window.requestAnimationFrame(frame);
      } else {
        btnTextEl.textContent = finalText;
        btnEl.classList.remove('scrambling');
        isScrambling = false;
        btnEl.style.pointerEvents = '';
        if (typeof onDone==='function') onDone();
      }
    }
    scrambleRAF = window.requestAnimationFrame(frame);
  }

  // ── CRT shutdown sequence ────────────────────────────────────────────────
  // Phases (all timings in ms):
  //   0–400   green-tinted static fills screen (canvas noise)
  //   400     flash: full screen bright green
  //   400–700 static collapses vertically to a horizontal line at center
  //   700     flash: line only
  //   700–950 line shrinks horizontally to a center dot
  //   950     flash: dot only
  //   950–1100 dot fades out
  //   1100    navigate

  function runCRTShutdown(onComplete) {
    // Create a full-screen overlay canvas that sits above everything
    var oc = document.createElement('canvas');
    shutdownOverlay = oc;
    oc.style.cssText = [
      'position:fixed', 'inset:0', 'width:100%', 'height:100%',
      'z-index:2147483647', 'pointer-events:none', 'display:block'
    ].join(';');
    document.body.appendChild(oc);

    var ow = window.innerWidth;
    var oh = window.innerHeight;
    oc.width  = ow;
    oc.height = oh;
    var octx = oc.getContext('2d');

    // Green phosphor palette — no whites or greys
    // dark=near black-green, mid=dim green, bright=phosphor green, hot=white-green flash
    var palette = [
      [4,  14,  4],   // near black
      [6,  24,  6],   // very dark green
      [10, 38,  10],  // dark green
      [16, 58,  16],  // mid-dark green
      [24, 85,  24],  // medium green
      [36, 120, 36],  // bright green
      [50, 155, 50],  // phosphor green
      [64, 185, 64],  // hot green — pulled back from 90,255,90
    ];

    function rndGreen() {
      var c = palette[Math.floor(Math.random() * palette.length)];
      // Occasional very bright pixel for texture
      if (Math.random() < 0.04) c = [140, 255, 140];
      return 'rgb('+c[0]+','+c[1]+','+c[2]+')';
    }

    var startTime = performance.now();
    var navigated = false;

    // Timing constants (ms)
    var T_STATIC_END   = 380;   // static fills screen until here
    var T_FLASH1       = 410;   // brief full-screen flash
    var T_COLLAPSE_END = 680;   // static collapses to line
    var T_FLASH2       = 710;   // line flash
    var T_DOT_END      = 940;   // line shrinks to dot
    var T_FLASH3       = 960;   // dot flash
    var T_FADE_END     = 1100;  // dot fades out
    var T_NAVIGATE     = 1120;  // navigate

    function easeOut(t) { return 1 - (1-t)*(1-t); }
    function easeIn(t)  { return t*t; }

    function drawNoise(clipY, clipH) {
      // ImageData pixel buffer — one putImageData call per frame regardless of resolution
      var bandH = Math.ceil(clipH);
      var imgData = octx.createImageData(ow, bandH);
      var d = imgData.data;
      var blockSize = 3;
      for (var py = 0; py < bandH; py += blockSize) {
        for (var px = 0; px < ow; px += blockSize) {
          var c = palette[Math.floor(Math.random() * palette.length)];
          if (Math.random() < 0.04) c = [90, 200, 90];
          for (var by = 0; by < blockSize && py+by < bandH; by++) {
            for (var bx = 0; bx < blockSize && px+bx < ow; bx++) {
              var idx = ((py + by) * ow + (px + bx)) * 4;
              d[idx]   = c[0];
              d[idx+1] = c[1];
              d[idx+2] = c[2];
              d[idx+3] = 255;
            }
          }
        }
      }
      octx.putImageData(imgData, 0, Math.floor(clipY));
      if (Math.random() < 0.35) {
        var ly = clipY + Math.random() * clipH;
        octx.fillStyle = 'rgba(74,255,74,0.18)';
        octx.fillRect(0, ly, ow, 1 + Math.random() * 2);
      }
    }

    function frame(now) {
      var elapsed = now - startTime;
      octx.clearRect(0, 0, ow, oh);

      var cy = oh / 2; // vertical center
      var cx = ow / 2; // horizontal center

      if (elapsed < T_STATIC_END) {
        // ── Phase 1: full-screen green static ──
        var fadeIn = Math.min(elapsed / T_STATIC_END, 1);
        oc.style.opacity = String(fadeIn);
        drawNoise(0, oh);

      } else if (elapsed < T_FLASH1) {
        // ── Flash 1: brief green flare, much dimmer ──
        oc.style.opacity = '1';
        octx.fillStyle = 'rgba(60,180,60,0.7)';
        octx.fillRect(0, 0, ow, oh);

      } else if (elapsed < T_COLLAPSE_END) {
        // ── Phase 2: blank dark screen, line emerges from center (matches CRT gif) ──
        oc.style.opacity = '1';
        var t = easeIn((elapsed - T_FLASH1) / (T_COLLAPSE_END - T_FLASH1));
        var halfH = Math.max(2, oh * 0.5 * (1 - t));
        var bandTop = cy - halfH;
        var bandH   = halfH * 2;

        octx.fillStyle = '#000';
        octx.fillRect(0, 0, ow, oh);

        // Dim green band — no static, just a fading glow collapsing to the line
        var bandAlpha = 0.18 + (1 - t) * 0.22;
        octx.fillStyle = 'rgba(70,210,70,' + bandAlpha + ')';
        octx.fillRect(0, bandTop, ow, bandH);

        // Bright edge lines
        octx.fillStyle = 'rgba(74,200,74,0.55)';
        octx.fillRect(0, bandTop, ow, 1);
        octx.fillRect(0, bandTop + bandH - 1, ow, 1);

      } else if (elapsed < T_FLASH2) {
        // ── Flash 2: horizontal line flares bright ──
        oc.style.opacity = '1';
        octx.fillStyle = '#000';
        octx.fillRect(0, 0, ow, oh);
        octx.fillStyle = 'rgba(100,220,100,0.85)';
