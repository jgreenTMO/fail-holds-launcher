<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<base target="_self">
<title>CDC Fail Holds — Management Review</title>
<style>
  :root {
    --bg: #060f06;
    --bg2: #081308;
    --bg3: #0a2a0a;
    --green: #4aff4a;
    --green2: #2aaa2a;
    --green3: #79ff79;
    --warn: #ffbb00;
    --contam: #ff7744;
    --appear: #44ccff;
    --text-dim: rgba(74,255,74,0.45);
    --text-soft: rgba(74,255,74,0.55);
    --text-faint: rgba(74,255,74,0.3);
    --panel: rgba(10,42,10,0.66);
    --border: rgba(74,255,74,0.25);
  }

  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  html,
  body {
    width: 100%;
    height: 100%;
    background: var(--bg);
    font-family: 'Courier New', Courier, monospace;
    overflow: hidden;
  }

  #terminal-launcher {
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100vh;
    background: radial-gradient(ellipse at center, rgba(10,42,10,0.65) 0%, var(--bg) 68%);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px 24px;
    overflow: hidden;
    z-index: 2147483647;
    font-family: 'Courier New', Courier, monospace;
  }

  .scanlines {
    position: absolute;
    inset: 0;
    pointer-events: none;
    z-index: 2;
    background: repeating-linear-gradient(
      to bottom,
      transparent 0px,
      transparent 3px,
      rgba(0, 0, 0, 0.18) 3px,
      rgba(0, 0, 0, 0.18) 4px
    );
  }

  .vignette {
    position: absolute;
    inset: 0;
    pointer-events: none;
    z-index: 3;
    background: radial-gradient(ellipse at center, transparent 54%, rgba(0, 0, 0, 0.72) 100%);
  }

  #glitch-canvas {
    position: absolute;
    inset: 0;
    z-index: 4;
    pointer-events: none;
    opacity: 0;
  }

  .css-glitch-1,
  .css-glitch-2 {
    position: absolute;
    inset: 0;
    z-index: 4;
    pointer-events: none;
    opacity: 0;
  }

  .glitch-active .css-glitch-1 {
    opacity: 1;
    background: rgba(74, 255, 74, 0.07);
    animation: glitch-shift-1 0.18s steps(1) 3;
  }

  .glitch-active .css-glitch-2 {
    opacity: 1;
    background: rgba(255, 60, 60, 0.05);
    animation: glitch-shift-2 0.22s steps(1) 3;
    animation-delay: 0.04s;
  }

  .corner {
    position: absolute;
    width: 18px;
    height: 18px;
    z-index: 5;
  }

  .corner.tl { top: 14px; left: 14px; border-top: 1.5px solid rgba(74,255,74,0.4); border-left: 1.5px solid rgba(74,255,74,0.4); }
  .corner.tr { top: 14px; right: 14px; border-top: 1.5px solid rgba(74,255,74,0.4); border-right: 1.5px solid rgba(74,255,74,0.4); }
  .corner.bl { bottom: 14px; left: 14px; border-bottom: 1.5px solid rgba(74,255,74,0.4); border-left: 1.5px solid rgba(74,255,74,0.4); }
  .corner.br { bottom: 14px; right: 14px; border-bottom: 1.5px solid rgba(74,255,74,0.4); border-right: 1.5px solid rgba(74,255,74,0.4); }

  .content {
    position: relative;
    z-index: 5;
    width: 100%;
    max-width: 760px;
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
  }

  .corp-header {
    font-size: 11px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 28px;
  }

  .title-block {
    margin-bottom: 12px;
  }

  .title-main {
    display: block;
    font-size: clamp(24px, 4vw, 30px);
    font-weight: 700;
    letter-spacing: 5px;
    line-height: 1.2;
    color: var(--green);
    text-shadow: 0 0 14px rgba(74,255,74,0.5);
  }

  .title-sub-line {
    display: block;
    margin-top: 6px;
    font-size: clamp(15px, 2.4vw, 18px);
    font-weight: 700;
    letter-spacing: 3px;
    color: var(--green);
    text-shadow: 0 0 10px rgba(74,255,74,0.4);
  }

  .title-caption {
    display: block;
    margin-top: 10px;
    font-size: 11px;
    letter-spacing: 3px;
    color: var(--text-soft);
  }

  .divider {
    width: min(100%, 660px);
    height: 1px;
    position: relative;
    margin: 26px 0 24px;
    background: var(--border);
  }

  .divider::before,
  .divider::after {
    content: '';
    position: absolute;
    top: -2.5px;
    width: 6px;
    height: 6px;
    background: var(--green);
  }

  .divider::before { left: 0; }
  .divider::after { right: 0; }

  .status-line {
    min-height: 20px;
    margin-bottom: 30px;
    font-size: 11px;
    letter-spacing: 2px;
    color: rgba(74,255,74,0.5);
  }

  .cursor {
    display: inline-block;
    width: 8px;
    height: 13px;
    margin-left: 4px;
    vertical-align: middle;
    background: var(--green);
    animation: blink 1.1s step-end infinite;
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0; }
  }

  .btn-label-top {
    margin-bottom: 13px;
    font-size: 9px;
    letter-spacing: 4px;
    color: var(--text-dim);
  }

  #launch-btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: min(300px, 92vw);
    height: 58px;
    border: 2px solid var(--green);
    background: var(--green);
    color: var(--bg);
    font-family: 'Courier New', Courier, monospace;
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 4px;
    text-transform: uppercase;
    cursor: pointer;
    user-select: none;
    outline: none;
    -webkit-appearance: none;
    appearance: none;
    position: relative;
    transition: background 0.1s, box-shadow 0.15s;
  }

  #launch-btn:hover {
    background: var(--green3);
    box-shadow: 0 0 30px rgba(74,255,74,0.6), inset 0 0 14px rgba(255,255,255,0.12);
  }

  #launch-btn:active {
    background: var(--green2);
  }

  #launch-btn.scrambling {
    background: var(--bg);
    color: var(--green);
    border-color: var(--green);
    box-shadow: 0 0 20px rgba(74,255,74,0.45);
  }

  #btn-text {
    pointer-events: none;
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 4px;
  }

  .footer-line {
    margin-top: 30px;
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--text-faint);
  }

  @keyframes glitch-shift-1 {
    0%, 100% { clip-path: inset(0 0 95% 0); transform: translateX(0); }
    20%      { clip-path: inset(10% 0 70% 0); transform: translateX(-6px); }
    40%      { clip-path: inset(40% 0 40% 0); transform: translateX(5px); }
    60%      { clip-path: inset(70% 0 10% 0); transform: translateX(-4px); }
    80%      { clip-path: inset(90% 0 2% 0); transform: translateX(3px); }
  }

  @keyframes glitch-shift-2 {
    0%, 100% { clip-path: inset(0 0 95% 0); transform: translateX(0); }
    25%      { clip-path: inset(20% 0 55% 0); transform: translateX(7px); }
    50%      { clip-path: inset(50% 0 25% 0); transform: translateX(-5px); }
    75%      { clip-path: inset(75% 0 5% 0); transform: translateX(4px); }
  }

  @media (max-width: 600px) {
    #terminal-launcher {
      padding: 28px 16px;
    }

    .corp-header {
      line-height: 1.5;
      margin-bottom: 22px;
    }

    .divider {
      margin: 22px 0 20px;
    }

    #launch-btn {
      height: 56px;
      letter-spacing: 3px;
    }
  }
</style>
</head>
<body>
<div id="terminal-launcher">
  <div class="scanlines"></div>
  <div class="vignette"></div>
  <canvas id="glitch-canvas"></canvas>
  <div class="css-glitch-1"></div>
  <div class="css-glitch-2"></div>
  <div class="corner tl"></div>
  <div class="corner tr"></div>
  <div class="corner bl"></div>
  <div class="corner br"></div>

  <div class="content">
    <div class="corp-header">THERMO FISHER SCIENTIFIC &nbsp;|&nbsp; CDC INVENTORY CONTROL</div>

    <div class="title-block">
      <span class="title-main">// FAIL HOLDS</span>
      <span class="title-sub-line">MANAGEMENT REVIEW</span>
      <span class="title-caption">PHASE 2 &nbsp;·&nbsp; HOLD MANAGEMENT &nbsp;·&nbsp; POWER AUTOMATE ENABLED</span>
    </div>

    <div class="divider"></div>

    <div class="status-line" id="status-text">
      SYSTEM: READY &nbsp;|&nbsp; AWAITING OPERATOR<span class="cursor"></span>
    </div>

    <div class="btn-label-top">[ INITIATE SESSION ]</div>

    <button id="launch-btn" type="button">
      <span id="btn-text">OPEN FAIL HOLDS APP</span>
    </button>

    <div class="footer-line">CDC INVENTORY TERMINAL &nbsp;·&nbsp; <span id="today-date"></span></div>
  </div>
</div>

<script>
(function () {
  var APP_URL = 'https://apps.powerapps.com/play/e/default-b67d722d-aa8a-4777-a169-ebeb7a6a3b67/a/3087df0e-02ac-4e69-b189-073eb430e74e?tenantId=b67d722d-aa8a-4777-a169-ebeb7a6a3b67';

  var launcher = document.getElementById('terminal-launcher');
  var canvas = document.getElementById('glitch-canvas');
  var statusEl = document.getElementById('status-text');
  var btnEl = document.getElementById('launch-btn');
  var btnTextEl = document.getElementById('btn-text');
  var todayEl = document.getElementById('today-date');
  var canvasOk = false;
  var ctx = null;
  var isScrambling = false;
  var scrambleRAF = null;
  var statusTimer = null;
  var glitchTimer = null;
  var resizeHandler = null;

  todayEl.textContent = new Date().toLocaleDateString('en-US', {
    month: '2-digit',
    day: '2-digit',
    year: 'numeric'
  });

  try {
    ctx = canvas.getContext('2d');
    if (ctx) {
      ctx.fillRect(0, 0, 1, 1);
      canvasOk = true;
    }
  } catch (e) {
    canvasOk = false;
    ctx = null;
  }

  function rInt(a, b) {
    return Math.floor(Math.random() * (b - a)) + a;
  }

  function resizeCanvas() {
    canvas.width = launcher.offsetWidth;
    canvas.height = launcher.offsetHeight;
  }

  function runCssGlitch() {
    launcher.classList.add('glitch-active');
    window.setTimeout(function () {
      launcher.classList.remove('glitch-active');
      scheduleGlitch();
    }, 350);
  }

  function scheduleGlitch() {
    glitchTimer = window.setTimeout(function () {
      if (canvasOk) {
        runCanvasGlitch();
      } else {
        runCssGlitch();
      }
    }, rInt(2800, 7000));
  }

  function runCanvasGlitch() {
    if (!canvasOk || !ctx) {
      runCssGlitch();
      return;
    }

    resizeCanvas();

    var w = canvas.width;
    var h = canvas.height;
    var duration = rInt(80, 220);
    var start = performance.now();
    var slices = [];

    for (var i = 0; i < rInt(3, 9); i++) {
      slices.push({
        y: rInt(0, h - 20),
        sh: rInt(2, 18),
        offset: (Math.random() - 0.5) * rInt(8, 40)
      });
    }

    var noiseLines = rInt(4, 12);

    function frame(now) {
      var elapsed = now - start;
      var p;
      var s;
      var sl;
      var shift;

      if (elapsed > duration) {
        ctx.clearRect(0, 0, w, h);
        canvas.style.opacity = 0;
        scheduleGlitch();
        return;
      }

      p = elapsed / duration;
      canvas.style.opacity = String(Math.sin(p * Math.PI) * 0.85);
      ctx.clearRect(0, 0, w, h);

      for (s = 0; s < slices.length; s++) {
        sl = slices[s];
        shift = sl.offset * Math.sin(p * Math.PI);

        ctx.fillStyle = 'rgba(0,0,0,' + (0.55 + Math.random() * 0.3) + ')';
        ctx.fillRect(0, sl.y, w, sl.sh);

        ctx.fillStyle = 'rgba(74,255,74,' + (0.06 + Math.random() * 0.08) + ')';
        ctx.fillRect(shift, sl.y, w, sl.sh);

        if (Math.random() < 0.25) {
          ctx.fillStyle = 'rgba(255,74,74,' + (0.04 + Math.random() * 0.05) + ')';
          ctx.fillRect(shift + rInt(-4, 4), sl.y, w, sl.sh);
        }
      }

      for (s = 0; s < noiseLines; s++) {
        ctx.fillStyle = 'rgba(74,255,74,' + (0.03 + Math.random() * 0.06) + ')';
        ctx.fillRect(rInt(0, w - 120), rInt(0, h), rInt(20, 120), 1);
      }

      if (Math.random() < 0.18) {
        ctx.fillStyle = 'rgba(74,255,74,' + (0.03 + Math.random() * 0.04) + ')';
        ctx.fillRect(0, rInt(0, h - 40), w, rInt(6, 30));
      }

      scrambleRAF = window.requestAnimationFrame(frame);
    }

    scrambleRAF = window.requestAnimationFrame(frame);
  }

  var statusMessages = [
    'SYSTEM: READY \u00a0|\u00a0 AWAITING OPERATOR',
    'CONN: SHAREPOINT \u00a0|\u00a0 STATUS OK',
    'FLOW ENGINE: ACTIVE \u00a0|\u00a0 TEAMS LINKED',
    'HOLD QUEUE: MONITORED \u00a0|\u00a0 READY',
    'AUTH: M365 \u00a0|\u00a0 SESSION VALID',
    'DEV - FAIL HOLDS \u00a0|\u00a0 LIST CONNECTED',
    'POWER AUTOMATE \u00a0|\u00a0 FLOWS ACTIVE',
    'SYSTEM: READY \u00a0|\u00a0 AWAITING OPERATOR'
  ];

  var msgIdx = 0;

  statusTimer = window.setInterval(function () {
    msgIdx = (msgIdx + 1) % statusMessages.length;
    statusEl.innerHTML = statusMessages[msgIdx] + '<span class="cursor"></span>';
  }, 4200);

  var alien = '!@#$%^&*<>?/\\|[]{}~±§¶ΔΨΩΞΛΘΦαβγδεζηθ';
  var defaultText = 'OPEN FAIL HOLDS APP';

  function pickAlien() {
    return alien[Math.floor(Math.random() * alien.length)];
  }

  function scrambleText(finalText, durationMs, onDone) {
    var len = finalText.length;
    var startTime = performance.now();

    function frame(now) {
      var elapsed = now - startTime;
      var progress = Math.min(elapsed / durationMs, 1);
      var resolved = Math.floor(progress * progress * len);
      var display = '';
      var i;

      for (i = 0; i < len; i++) {
        if (finalText[i] === ' ') {
          display += ' ';
        } else if (i < resolved) {
          display += finalText[i];
        } else {
          display += pickAlien();
        }
      }

      btnTextEl.textContent = display;

      if (progress < 1) {
        scrambleRAF = window.requestAnimationFrame(frame);
      } else {
        btnTextEl.textContent = finalText;
        btnEl.classList.remove('scrambling');
        isScrambling = false;
        btnEl.style.pointerEvents = '';
        if (typeof onDone === 'function') {
          onDone();
        }
      }
    }

    scrambleRAF = window.requestAnimationFrame(frame);
  }

  btnEl.addEventListener('click', function (e) {
    e.preventDefault();
    e.stopPropagation();

    if (isScrambling) {
      return;
    }

    isScrambling = true;
    btnEl.style.pointerEvents = 'none';

    if (scrambleRAF) {
      window.cancelAnimationFrame(scrambleRAF);
    }

    btnEl.classList.add('scrambling');

    scrambleText(defaultText, 1050, function () {
      window.location.href = APP_URL;
    });
  });

  resizeHandler = function () {
    resizeCanvas();
  };
  window.addEventListener('resize', resizeHandler);
  resizeCanvas();

  if (canvasOk) {
    window.setTimeout(runCanvasGlitch, 1200);
  } else {
    window.setTimeout(runCssGlitch, 1200);
  }
})();
</script>
</body>
</html>
